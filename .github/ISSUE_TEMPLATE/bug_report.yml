name: Bug report
description: Report a reproducible QuotaBar problem.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude
        - Codex
        - Cursor
        - Antigravity
        - Tray or window
        - Build or install
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open QuotaBar...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste logs, screenshots, or exact error text. Do not include tokens, cookies, or secrets.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0 or commit SHA
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Windows 11, etc.
